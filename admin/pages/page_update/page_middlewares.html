<template id="page-middlewares-template">
  <template v-if="loading">
    <div class="text-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>
  </template>

  <template v-else>
    <div class="alert alert-info">
      You can add middlewares here that will be executed before or after the page content.
      Before middlewares can be used i.e. to authenticate the user.
      After middlewares can be used to change the page content after it has been generated.
    </div>

    <div class="mb-4">
      <h5>Middlewares Executed Before Page Content</h5>
      <div class="d-flex gap-2 mb-2">
        <input
          type="text"
          class="form-control"
          v-model="newBefore"
          placeholder="Enter middleware name..."
          @keyup.enter="addBefore"
        />
        <button type="button" class="btn btn-outline-primary" @click="addBefore" :disabled="!newBefore.trim()">
          <i class="bi bi-plus-lg"></i> Add
        </button>
      </div>
      <div v-if="form.before.length > 0" class="list-group">
        <div
          v-for="(mw, index) in form.before"
          :key="'before-' + index"
          class="list-group-item d-flex justify-content-between align-items-center"
        >
          <span>{{ mw }}</span>
          <div class="btn-group btn-group-sm">
            <button type="button" class="btn btn-outline-secondary" @click="moveUpBefore(index)" :disabled="index === 0">
              <i class="bi bi-arrow-up"></i>
            </button>
            <button type="button" class="btn btn-outline-secondary" @click="moveDownBefore(index)" :disabled="index === form.before.length - 1">
              <i class="bi bi-arrow-down"></i>
            </button>
            <button type="button" class="btn btn-outline-danger" @click="removeBefore(index)">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </div>
      </div>
      <div v-else class="text-muted small">No before middlewares configured</div>
    </div>

    <hr />

    <div class="mb-4">
      <h5>Middlewares Executed After Page Content</h5>
      <div class="d-flex gap-2 mb-2">
        <input
          type="text"
          class="form-control"
          v-model="newAfter"
          placeholder="Enter middleware name..."
          @keyup.enter="addAfter"
        />
        <button type="button" class="btn btn-outline-primary" @click="addAfter" :disabled="!newAfter.trim()">
          <i class="bi bi-plus-lg"></i> Add
        </button>
      </div>
      <div v-if="form.after.length > 0" class="list-group">
        <div
          v-for="(mw, index) in form.after"
          :key="'after-' + index"
          class="list-group-item d-flex justify-content-between align-items-center"
        >
          <span>{{ mw }}</span>
          <div class="btn-group btn-group-sm">
            <button type="button" class="btn btn-outline-secondary" @click="moveUpAfter(index)" :disabled="index === 0">
              <i class="bi bi-arrow-up"></i>
            </button>
            <button type="button" class="btn btn-outline-secondary" @click="moveDownAfter(index)" :disabled="index === form.after.length - 1">
              <i class="bi bi-arrow-down"></i>
            </button>
            <button type="button" class="btn btn-outline-danger" @click="removeAfter(index)">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </div>
      </div>
      <div v-else class="text-muted small">No after middlewares configured</div>
    </div>

    <input type="hidden" name="page_id" :value="pageId" />

    <div class="mt-3 text-end">
      <button type="button" class="btn btn-primary" @click="saveMiddlewares" :disabled="saving">
        <i class="bi bi-save me-1"></i>
        <span>Save</span>
        <span v-if="saving" class="spinner-border spinner-border-sm align-middle ms-2" role="status">
          <span class="visually-hidden">Loading</span>
        </span>
      </button>
    </div>
  </template>
</template>
<div id="page-middlewares-app"></div>
