<template id="page-content-template">
  <template v-if="loading">
    <div class="text-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>
  </template>

  <template v-else>
    <form @submit.prevent="saveContent">
      <div class="mb-3">
        <label for="page_title" class="form-label">Title</label>
        <input
          type="text"
          id="page_title"
          name="page_title"
          class="form-control"
          v-model="form.title"
        />
        <div class="form-text">The title of this webpage. This will be displayed in the browser tab</div>
      </div>

      <div class="mb-3">
        <label for="page_content" class="form-label">Content</label>
        <textarea
          id="page_content"
          name="page_content"
          class="form-control"
          v-model="form.content"
          rows="15"
        ></textarea>
        <div class="form-text">The content of this webpage. This will be displayed in the browser.</div>
      </div>

      <input type="hidden" name="page_id" :value="pageId" />

      <div class="mt-3 text-end">
        <button
          type="submit"
          class="btn btn-primary"
          :disabled="saving"
        >
          <i class="bi bi-save me-1"></i>
          <span>Save</span>
          <span
            v-if="saving"
            class="spinner-border spinner-border-sm align-middle ms-2"
            role="status"
          >
            <span class="visually-hidden">Loading</span>
          </span>
        </button>
      </div>
    </form>
  </template>
</template>
<div id="page-content-app"></div>
